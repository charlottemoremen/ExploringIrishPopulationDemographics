<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Irish Population Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@6"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --page-padding: 8px;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #ffffff;
      color: #222;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      padding: var(--page-padding);
    }

    #vis-shell {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow: visible;
    }

    #vis-stage {
      transform-origin: top center;
      will-change: transform;
      display: inline-block;
    }

    .vega-embed,
    .vega-embed > div {
      max-width: none !important;
    }
  </style>
</head>
<body>
  <div class="page">
    <div id="vis-shell">
      <div id="vis-stage"></div>
    </div>
  </div>

  <script>
    const visShell = document.getElementById("vis-shell");
    const visStage = document.getElementById("vis-stage");

    let naturalWidth = null;
    let naturalHeight = null;

    function debounce(fn, delay = 100) {
      let timer = null;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), delay);
      };
    }

    function measureNaturalSize() {
      // remove scaling before measuring
      visStage.style.transform = "scale(1)";

      // use actual rendered content size
      naturalWidth = visStage.scrollWidth;
      naturalHeight = visStage.scrollHeight;
    }

    function applyScale() {
      if (!naturalWidth || !naturalHeight) return;

      const pagePadding = 16; // 8px left + 8px right
      const availableWidth = window.innerWidth - pagePadding;
      const availableHeight = window.innerHeight - pagePadding;

      const scaleX = availableWidth / naturalWidth;
      const scaleY = availableHeight / naturalHeight;

      // Fit if possible, but never enlarge above natural size
      const scale = Math.min(scaleX, scaleY, 1);

      visStage.style.width = `${naturalWidth}px`;
      visStage.style.height = `${naturalHeight}px`;
      visStage.style.transform = `scale(${scale})`;

      // Reserve enough space in normal layout so scrolling still works if needed
      visShell.style.minHeight = `${Math.ceil(naturalHeight * scale)}px`;
    }

    async function init() {
      await vegaEmbed("#vis-stage", "spec.json", {
        actions: false,
        renderer: "svg"
      });

      // wait a moment so the browser fully lays out the SVG
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          measureNaturalSize();
          applyScale();
        });
      });
    }

    const onResize = debounce(() => {
      measureNaturalSize();
      applyScale();
    }, 100);

    window.addEventListener("resize", onResize);

    init().catch(console.error);
  </script>
</body>
</html>
