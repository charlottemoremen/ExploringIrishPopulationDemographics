<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Irish Population Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@6"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --page-padding: 12px;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      color: #222;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .page {
      width: 100vw;
      height: 100vh;
      padding: var(--page-padding);
      overflow: hidden;
    }

    #vis-shell {
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    #vis-stage {
      transform-origin: top center;
      will-change: transform;
    }

    .vega-embed,
    .vega-embed > div {
      max-width: none !important;
    }

    @media (max-width: 900px) {
      :root {
        --page-padding: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div id="vis-shell">
      <div id="vis-stage"></div>
    </div>
  </div>

  <script>
    const visShell = document.getElementById("vis-shell");
    const visStage = document.getElementById("vis-stage");

    let naturalWidth = null;
    let naturalHeight = null;

    function debounce(fn, delay = 100) {
      let timer = null;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), delay);
      };
    }

    function applyScale() {
      if (!naturalWidth || !naturalHeight) return;

      const shellWidth = visShell.clientWidth;
      const shellHeight = visShell.clientHeight;

      const scaleX = shellWidth / naturalWidth;
      const scaleY = shellHeight / naturalHeight;

      // Never upscale beyond natural size
      const scale = Math.min(scaleX, scaleY, 1);

      visStage.style.transform = `scale(${scale})`;
      visShell.style.height = `${shellHeight}px`;
      visStage.style.width = `${naturalWidth}px`;
      visStage.style.height = `${naturalHeight}px`;
    }

    async function init() {
      const result = await vegaEmbed("#vis-stage", "spec.json", {
        actions: false,
        renderer: "svg"
      });

      await result.view.runAsync();

      const embedRoot =
        visStage.querySelector(".vega-embed") || visStage.firstElementChild;

      naturalWidth = embedRoot.offsetWidth;
      naturalHeight = embedRoot.offsetHeight;

      applyScale();
    }

    const onResize = debounce(applyScale, 80);
    window.addEventListener("resize", onResize);

    init().catch(console.error);
  </script>
</body>
</html>
