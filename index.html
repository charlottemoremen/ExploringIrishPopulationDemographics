<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Exploring Irish Population Demographics</title>

  <script src="https://cdn.jsdelivr.net/npm/vega"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #222;
    }

    .page {
      width: min(1400px, 100vw);
      margin: 0 auto;
      padding: 16px;
    }

    h1 {
      margin: 0 0 8px 0;
      text-align: center;
    }

    .note {
      margin: 0 0 20px 0;
      text-align: center;
      color: #666;
    }

    #vis {
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Exploring Irish Population Demographics</h1>
    <div class="note">Interactive dashboard built with Vega-Lite</div>
    <div id="vis"></div>
  </div>

  <script>
    vegaEmbed("#vis", "spec.json", {
      actions: {
        export: true,
        source: false,
        editor: true
      },
      renderer: "svg"
    }).catch(console.error);
  </script>
</body>
</html>
