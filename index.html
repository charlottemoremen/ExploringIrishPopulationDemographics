<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Irish Population Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@6"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --page-padding: 16px;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #ffffff;
      color: #222;
      font-family: Arial, sans-serif;
    }

    body {
      overflow-x: hidden;
    }

    .page {
      width: 100vw;
      min-height: 100vh;
      padding: var(--page-padding);
    }

    #vis {
      width: 100%;
      max-width: 1600px;
      margin: 0 auto;
    }

    .vega-embed,
    .vega-embed > div {
      width: 100% !important;
      max-width: 100% !important;
    }

    @media (max-width: 900px) {
      :root {
        --page-padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div id="vis"></div>
  </div>

  <script>
    async function renderVis() {
      await vegaEmbed("#vis", "spec.json", {
        actions: false,
        renderer: "svg"
      });
    }

    renderVis().catch(console.error);
  </script>
</body>
</html>
