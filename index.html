<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Exploring Irish Population Demographics</title>

  <script src="https://cdn.jsdelivr.net/npm/vega"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed"></script>

  <style>
    body {
      margin: 0;
      background: #ffffff;
      color: #222;
      font-family: Arial, sans-serif;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px 0;
      text-align: center;
      font-size: 28px;
    }

    .note {
      color: #666;
      margin: 0 0 24px 0;
      text-align: center;
      font-size: 14px;
    }

    #vis {
      width: 100%;
      display: flex;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="page">
 
    <div id="vis"></div>
  </div>

  <script>
    vegaEmbed("#vis", "spec.json", {
      actions: {
        export: true,
        source: false,
        editor: true
      }
    }).catch(console.error);
  </script>
</body>
</html>
