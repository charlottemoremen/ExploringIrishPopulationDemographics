<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Irish Population Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@6"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #ffffff;
      color: #222;
      font-family: Arial, sans-serif;
    }

    .page {
      width: 100%;
      margin: 0 auto;
      padding: 16px;
    }

    #vis-shell {
      width: 100%;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    #vis-stage {
      transform-origin: top center;
      will-change: transform;
    }

    .vega-embed,
    .vega-embed > div {
      max-width: none !important;
    }
  </style>
</head>
<body>
  <div class="page">
    <div id="vis-shell">
      <div id="vis-stage"></div>
    </div>
  </div>

  <script>
    const visShell = document.getElementById("vis-shell");
    const visStage = document.getElementById("vis-stage");

    let naturalWidth = null;
    let naturalHeight = null;

    function applyScale() {
      if (!naturalWidth || !naturalHeight) return;

      const shellWidth = visShell.clientWidth;
      const scale = Math.min(1, shellWidth / naturalWidth);

      visStage.style.transform = `scale(${scale})`;
      visShell.style.height = `${Math.ceil(naturalHeight * scale)}px`;
    }

    function debounce(fn, delay = 100) {
      let timer = null;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), delay);
      };
    }

    async function init() {
      const result = await vegaEmbed("#vis-stage", "spec.json", {
        actions: false,
        renderer: "svg"
      });

      await result.view.runAsync();

      const embedRoot =
        visStage.querySelector(".vega-embed") || visStage.firstElementChild;

      naturalWidth = embedRoot.offsetWidth;
      naturalHeight = embedRoot.offsetHeight;

      applyScale();
    }

    window.addEventListener("resize", debounce(applyScale, 80));
    init().catch(console.error);
  </script>
</body>
</html>
