<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Irish Population Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@6"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #ffffff;
      color: #222;
      font-family: Arial, sans-serif;
    }

    body {
      overflow-x: hidden;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      padding: 12px;
    }

    #vis {
      width: 100%;
      max-width: 1500px;
      margin: 0 auto;
    }

    .vega-embed,
    .vega-embed > div {
      width: 100% !important;
      max-width: 100% !important;
    }
  </style>
</head>
<body>
  <div class="page">
    <div id="vis"></div>
  </div>

  <script>
    const VIS_ID = "#vis";

    function debounce(fn, delay = 120) {
      let timer = null;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), delay);
      };
    }

    function buildResponsiveSpec(baseSpec) {
      const pagePadding = 24; // approx left + right page padding
      const availableWidth = Math.min(window.innerWidth - pagePadding, 1500);

      const isNarrow = availableWidth < 900;
      const gap = isNarrow ? 16 : 24;
      const panelWidth = isNarrow
        ? Math.max(320, availableWidth - 20)
        : Math.max(320, Math.floor((availableWidth - gap) / 2));

      const topHeight = isNarrow ? 320 : 380;
      const bottomHeight = isNarrow ? 320 : 420;

      const spec = structuredClone(baseSpec);

      spec.spacing = gap;
      spec.config = spec.config || {};
      spec.config.concat = { spacing: gap };
      spec.autosize = {
        type: "pad",
        contains: "padding",
        resize: true
      };

      if (isNarrow) {
        spec.vconcat = [
          spec.vconcat[0].hconcat[0],
          spec.vconcat[0].hconcat[1],
          spec.vconcat[1].hconcat[0],
          spec.vconcat[1].hconcat[1]
        ];

        spec.vconcat[0].width = panelWidth;
        spec.vconcat[0].height = topHeight;
        spec.vconcat[1].width = panelWidth;
        spec.vconcat[1].height = topHeight;
        spec.vconcat[2].width = panelWidth;
        spec.vconcat[2].height = bottomHeight;
        spec.vconcat[3].width = panelWidth;
        spec.vconcat[3].height = bottomHeight;
      } else {
        spec.vconcat[0].spacing = gap;
        spec.vconcat[1].spacing = gap;

        spec.vconcat[0].hconcat[0].width = panelWidth;
        spec.vconcat[0].hconcat[0].height = topHeight;
        spec.vconcat[0].hconcat[1].width = panelWidth;
        spec.vconcat[0].hconcat[1].height = topHeight;

        spec.vconcat[1].hconcat[0].width = panelWidth;
        spec.vconcat[1].hconcat[0].height = bottomHeight;
        spec.vconcat[1].hconcat[1].width = panelWidth;
        spec.vconcat[1].hconcat[1].height = bottomHeight;
      }

      return spec;
    }

    async function renderVis() {
      const response = await fetch("spec.json");
      const baseSpec = await response.json();
      const spec = buildResponsiveSpec(baseSpec);

      document.querySelector(VIS_ID).innerHTML = "";

      await vegaEmbed(VIS_ID, spec, {
        actions: false,
        renderer: "svg"
      });
    }

    const rerender = debounce(() => {
      renderVis().catch(console.error);
    }, 150);

    window.addEventListener("resize", rerender);
    renderVis().catch(console.error);
  </script>
</body>
</html>
